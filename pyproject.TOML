[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"
#[build-system]
#requires = ["setuptools>=68.0", "wheel"]
#build-backend = "setuptools.backends.legacy:build"

[project]
name = "personal-finance-control"
version = "1.0.0"
description = "OpenEnv-compliant RL environment for personal finance behaviour control"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"

keywords = ["reinforcement-learning", "personal-finance", "openenv", "ai-agent"]

classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

dependencies = [
    "pydantic>=2.0,<3.0",
    "PyYAML>=6.0",
    "openenv-core>=0.2.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
    "ruff>=0.4.0",
    "mypy>=1.0",
]

[project.scripts]
finenv = "inference:main"
server = "server.app:main"

[project.urls]
Homepage = "https://github.com/your-org/personal-finance-control"
Repository = "https://github.com/your-org/personal-finance-control"

# ─── Setuptools ────────────────────────────────────────────────────────────
[tool.setuptools.packages.find]
where = ["."]
include = ["*.py", "server", "server.*"]

# ─── Ruff (linter) ─────────────────────────────────────────────────────────
[tool.ruff]
line-length = 88
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]   # pycodestyle + pyflakes + isort
ignore = ["E501"]               # line-length handled by formatter

# ─── Mypy (type checker) ───────────────────────────────────────────────────
[tool.mypy]
python_version = "3.11"
strict = false
ignore_missing_imports = true

# ─── Pytest ────────────────────────────────────────────────────────────────
[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"