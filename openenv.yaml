name: personal-finance-control
version: "1.0.0"
description: >
  An OpenEnv-compliant reinforcement learning environment that simulates
  a user's personal financial life over a 30-day month. An AI agent
  observes daily financial state and takes actions to control spending,
  maximising savings while keeping user satisfaction high.
author: Hackathon Team
license: MIT

# ─── Entrypoint ────────────────────────────────────────────────────────────
entrypoint: inference.py

# ─── Environment ───────────────────────────────────────────────────────────
environment:
  class: PersonalFinanceEnv
  module: env
  episode_length: 30          # one step per day, 30 days per episode
  deterministic: true         # reproducible with seed
  seed: 42

  parameters:
    monthly_income:
      type: float
      default: 5000.0
      description: Fixed monthly salary in USD
    behavior_type:
      type: string
      default: impulsive
      enum: [impulsive, disciplined, emotional]
      description: Simulated user spending persona

# ─── Observation Space ─────────────────────────────────────────────────────
observation_space:
  type: object
  description: Daily financial snapshot seen by the agent
  fields:
    day_of_month:
      type: integer
      range: [1, 30]
      description: Current day of the month
    balance:
      type: float
      unit: USD
      description: Current bank balance
    monthly_income:
      type: float
      unit: USD
      description: Fixed income for the month
    spent_so_far:
      type: float
      unit: USD
      description: Cumulative spending this month
    spending_ratio:
      type: float
      range: [0.0, 2.0]
      description: spent_so_far / monthly_income (>1 means overspent)
    upcoming_expenses:
      type: array
      items:
        type: object
        fields:
          name: {type: string}
          amount: {type: float}
          is_necessary: {type: boolean}
          scheduled_day: {type: integer}
      description: Expenses scheduled in the next 7 days
    risk_score:
      type: float
      range: [0.0, 1.0]
      description: Estimated probability user overspends today
    user_behavior_type:
      type: string
      enum: [impulsive, disciplined, emotional]
      description: Active user persona
    user_satisfaction:
      type: float
      range: [0.0, 1.0]
      description: User happiness with agent interventions

# ─── Action Space ──────────────────────────────────────────────────────────
action_space:
  type: object
  description: Agent action for the current day
  fields:
    action_type:
      type: string
      enum:
        - allow_spending       # permit the purchase
        - block_spending       # prevent the purchase entirely
        - delay_spending       # reschedule purchase 3 days later
        - send_warning         # notify user with educational message
        - suggest_alternative  # offer a cheaper substitute (60% cost)
      required: true
    message:
      type: string
      required: false
      description: Optional human-readable message shown to the user

# ─── Reward ────────────────────────────────────────────────────────────────
reward:
  type: dense
  description: >
    Step rewards are given every day; a terminal bonus/penalty
    is added on day 30 based on total savings and satisfaction.
  components:
    under_budget_bonus:
      value: +0.3 per step
      condition: spending_ratio < 0.75
    overspend_penalty:
      formula: -(overshoot * 5.0) per step
      condition: spending_ratio > 0.75
    unnecessary_blocked:
      value: +1.5
      condition: agent blocks an unnecessary expense
    warning_effective:
      value: +0.8
      condition: warning successfully deters spending
    delay_action:
      value: +0.5
      condition: expense successfully delayed
    suggest_alternative:
      value: +0.4
      condition: user accepts cheaper option
    warning_spam_penalty:
      value: -0.3 per extra warning
      condition: total warnings > 5
    excessive_blocking_penalty:
      value: -0.5
      condition: block_count > 8
    low_satisfaction_penalty:
      value: -1.0 per step
      condition: user_satisfaction < 0.4
    terminal_savings_bonus:
      range: [1.0, 10.0]
      condition: end of month, savings >= 10% of income
    terminal_satisfaction_bonus:
      formula: user_satisfaction * 3.0
      condition: end of month

# ─── Tasks ─────────────────────────────────────────────────────────────────
tasks:
  - id: task1
    name: Budget Compliance
    difficulty: easy
    persona: disciplined
    seed: 42
    grader: Task1.grader
    score_range: [0.0, 1.0]

  - id: task2
    name: Impulse Control
    difficulty: medium
    persona: impulsive
    seed: 99
    grader: Task2.grader
    score_range: [0.0, 1.0]

  - id: task3
    name: Full Month Optimisation
    difficulty: hard
    persona: emotional
    seed: 777
    grader: Task3.grader
    score_range: [0.0, 1.0]

# ─── Evaluation ────────────────────────────────────────────────────────────
evaluation:
  method: average_score
  aggregation: mean
  deterministic: true
  description: >
    Average score across all 3 tasks. Scores are reproducible because
    every environment uses a fixed seed and no external randomness.
